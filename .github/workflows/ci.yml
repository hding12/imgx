name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install image tools on macOS
        if: runner.os == 'macOS'
        run: brew install vips exiftool pngquant webp
      - name: Install image tools on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libvips-tools libimage-exiftool-perl pngquant webp
      - run: npm ci
      - run: npm run verify
